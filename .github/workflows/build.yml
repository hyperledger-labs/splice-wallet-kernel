                  echo "ci-fork test-ping-e2e=${{ needs.ci-fork.outputs.test_ping_e2e_result }}"
                  exit 1

    test-portfolio-e2e:
        name: test-portfolio-e2e
        runs-on: ubuntu-latest
        needs: [ci-internal, ci-fork]
        if: always()
        steps:
            - name: Report test-portfolio-e2e status
