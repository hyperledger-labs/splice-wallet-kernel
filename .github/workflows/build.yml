name: CI on PRs
run-name: ${{ github.actor }} is perfoming a Pull Request

on:
    pull_request:
        types: [opened, reopened, synchronize, edited]
    pull_request_target:
        types: [opened, reopened, synchronize, edited]
permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-${{ github.event_name }}
    cancel-in-progress: true

jobs:
    ci-internal:
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false && !contains(github.event.pull_request.title, 'chore(release):')
        uses: ./.github/workflows/build-primary.yml
        with:
            checkout_ref: ${{ github.event.pull_request.head.sha }}
            allow_cache: true
            pr_number: ${{ github.event.pull_request.number }}
            pr_title: ${{ github.event.pull_request.title }}
            pr_head_sha: ${{ github.event.pull_request.head.sha }}
            pr_base_ref: ${{ github.base_ref }}
        outputs:
            build_result: ${{ jobs.build.result }}
            test_static_result: ${{ jobs.test-static.result }}
            test_unit_result: ${{ jobs.test-unit.result }}
            test_wallet_sdk_e2e_result: ${{ jobs.test-wallet-sdk-e2e.result }}
            test_ping_e2e_result: ${{ jobs.test-ping-e2e.result }}
            test_portfolio_e2e_result: ${{ jobs.test-portfolio-e2e.result }}

    ci-fork:
        if: github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.fork == true && !contains(github.event.pull_request.title, 'chore(release):')
        uses: ./.github/workflows/build-primary.yml
        with:
            checkout_ref: ${{ github.event.pull_request.head.sha }}
            allow_cache: false
            pr_number: ${{ github.event.pull_request.number }}
            pr_title: ${{ github.event.pull_request.title }}
            pr_head_sha: ${{ github.event.pull_request.head.sha }}
            pr_base_ref: ${{ github.base_ref }}
        outputs:
            build_result: ${{ jobs.build.result }}
            test_static_result: ${{ jobs.test-static.result }}
            test_unit_result: ${{ jobs.test-unit.result }}
            test_wallet_sdk_e2e_result: ${{ jobs.test-wallet-sdk-e2e.result }}
            test_ping_e2e_result: ${{ jobs.test-ping-e2e.result }}
            test_portfolio_e2e_result: ${{ jobs.test-portfolio-e2e.result }}

    build:
        name: build
        runs-on: ubuntu-latest
        needs: [ci-internal, ci-fork]
        if: always()
        steps:
            - name: Report build status
              run: |
                  if [[ "${{ needs.ci-internal.outputs.build_result }}" == "success" || "${{ needs.ci-fork.outputs.build_result }}" == "success" ]]; then
                    exit 0
                  fi
                  if [[ "${{ needs.ci-internal.outputs.build_result }}" == "skipped" && "${{ needs.ci-fork.outputs.build_result }}" == "skipped" ]]; then
                    exit 0
                  fi
                  echo "ci-internal build=${{ needs.ci-internal.outputs.build_result }}"
                  echo "ci-fork build=${{ needs.ci-fork.outputs.build_result }}"
                  exit 1

    test-static:
        name: test-static
        runs-on: ubuntu-latest
        needs: [ci-internal, ci-fork]
        if: always()
        steps:
            - name: Report test-static status
              run: |
                  if [[ "${{ needs.ci-internal.outputs.test_static_result }}" == "success" || "${{ needs.ci-fork.outputs.test_static_result }}" == "success" ]]; then
                    exit 0
                  fi
                  if [[ "${{ needs.ci-internal.outputs.test_static_result }}" == "skipped" && "${{ needs.ci-fork.outputs.test_static_result }}" == "skipped" ]]; then
                    exit 0
                  fi
                  echo "ci-internal test-static=${{ needs.ci-internal.outputs.test_static_result }}"
                  echo "ci-fork test-static=${{ needs.ci-fork.outputs.test_static_result }}"
                  exit 1

    test-unit:
        name: test-unit
        runs-on: ubuntu-latest
        needs: [ci-internal, ci-fork]
        if: always()
        steps:
            - name: Report test-unit status
              run: |
                  if [[ "${{ needs.ci-internal.outputs.test_unit_result }}" == "success" || "${{ needs.ci-fork.outputs.test_unit_result }}" == "success" ]]; then
                    exit 0
                  fi
                  if [[ "${{ needs.ci-internal.outputs.test_unit_result }}" == "skipped" && "${{ needs.ci-fork.outputs.test_unit_result }}" == "skipped" ]]; then
                    exit 0
                  fi
                  echo "ci-internal test-unit=${{ needs.ci-internal.outputs.test_unit_result }}"
                  echo "ci-fork test-unit=${{ needs.ci-fork.outputs.test_unit_result }}"
                  exit 1

    test-wallet-sdk-e2e:
        name: test-wallet-sdk-e2e
        runs-on: ubuntu-latest
        needs: [ci-internal, ci-fork]
        if: always()
        steps:
            - name: Report test-wallet-sdk-e2e status
              run: |
                  if [[ "${{ needs.ci-internal.outputs.test_wallet_sdk_e2e_result }}" == "success" || "${{ needs.ci-fork.outputs.test_wallet_sdk_e2e_result }}" == "success" ]]; then
                    exit 0
