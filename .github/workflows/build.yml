name: CI on PRs
run-name: ${{ github.actor }} is perfoming a Pull Request

on:
    pull_request:
        types: [opened, reopened, synchronize, edited]
permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - uses: ./.github/actions/setup_yarn

            - name: run codegen
              run: yarn generate:all

            - name: Build project
              run: yarn build:all

            - name: Save Nx cache
              if: always()
              uses: actions/cache@v4
              with:
                  path: |
                      .nx/cache
                      .nx/workspace-data
                  key: nx-${{ github.ref }}

    build-docs:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version-file: .python-version

            - name: Install and configure Poetry
              uses: snok/install-poetry@v1
              with:
                  version: 2.1.3

            # load cached venv if cache exists
            - name: Load cached venv
              id: cached-poetry-dependencies
              uses: actions/cache@v4
              with:
                  path: docs/wallet-integration-guide/.venv
                  key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('docs/wallet-integration-guide/poetry.lock') }}

            # install dependencies if cache does not exist
            - name: Install dependencies
              if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
              working-directory: docs/wallet-integration-guide
              run: poetry install --no-interaction --no-root

            - name: Build docs
              working-directory: docs/wallet-integration-guide
              run: poetry run sphinx-build -c . src build --fail-on-warning

    test-static:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - uses: ./.github/actions/setup_yarn

            - name: Validate current PR title with commitlint
              run: echo "$TITLE" | yarn commitlint --verbose
              env:
                  TITLE: ${{ github.event.pull_request.title }}

            - name: check package.json names
              run: yarn script:cleancoding

            - name: run typechecking
              run: yarn nx run-many -t typecheck --parallel

            - name: check open-rpc specs titles
              run: yarn script:openrpc:titles

            - name: prettier code
              run: yarn run prettier . --check

            - name: eslint code
              run: yarn nx run-many -t lint --parallel

    test-unit:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: ./.github/actions/setup_yarn

            - name: Run affected unit tests
              run: |
                  yarn nx affected -t test \
                    --base=origin/${{ github.base_ref }} \
                    --head=HEAD \
                    --parallel

    test-kernel-e2e:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - uses: ./.github/actions/setup_yarn

            - uses: ./.github/actions/setup_canton
              with:
                  network: canton

            - name: Build project
              run: yarn build:all:serial

            - name: Start remote WK
              run: yarn nx run @canton-network/wallet-gateway-remote:start &

            - run: yarn nx run @canton-network/example-ping:dev > "example-ping.log" 2>&1 &

            - run: yarn nx run @canton-network/mock-oauth2:start &

            - uses: ./.github/actions/setup_playwright

            - name: Run example e2e
              run: yarn nx playwright:e2e @canton-network/example-ping

            - uses: actions/upload-artifact@v4
              if: ${{ !cancelled() }}
              with:
                  name: playwright-report
                  path: examples/ping/playwright-report/
                  retention-days: 5

            - uses: actions/upload-artifact@v4
              if: ${{ failure() }}
              with:
                  name: example-ping-logs
                  path: example-ping.log
                  retention-days: 5

    test-portfolio-e2e:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - uses: ./.github/actions/setup_yarn

            - uses: ./.github/actions/setup_canton

              # for some reason it breaks if we don't have a build here...
            - name: Build project
              run: yarn build:all

            - name: Start remote WK
              run: yarn nx run @canton-network/wallet-gateway-remote:start > "wallet-gateway-remote.log" 2>&1 &

            - run: yarn nx run @canton-network/example-portfolio:dev > "example-portfolio.log" 2>&1 &

            - run: yarn nx run @canton-network/mock-oauth2:start &

            - uses: ./.github/actions/setup_playwright

            - name: Run example e2e
              run: yarn nx playwright:e2e @canton-network/example-portfolio

            - uses: actions/upload-artifact@v4
              if: ${{ !cancelled() }}
              with:
                  name: example-portfolio-playwright-report
                  path: examples/portfolio/playwright-report/
                  retention-days: 5

            - uses: actions/upload-artifact@v4
              if: ${{ failure() }}
              with:
                  name: example-portfolio-logs
                  path: '*.log'
                  retention-days: 5

    wallet-sdk-affected:
        name: wallet-sdk-affected
        runs-on: ubuntu-latest
        outputs:
            run_wallet_sdk_tests: ${{ steps.affected.outputs.run_wallet_sdk_tests }}
            matched_projects: ${{ steps.affected.outputs.matched_projects }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: ./.github/actions/setup_yarn

            - name: Detect wallet-sdk related affected projects
              id: affected
              run: |
                  AFFECTED_PROJECTS_JSON="$(yarn nx show projects --affected --base=origin/${{ github.base_ref }} --head=HEAD --json)"
                  WALLET_SDK_AFFECTED_JSON="$(yarn nx show projects --affected --base=origin/${{ github.base_ref }} --head=HEAD --projects @canton-network/wallet-sdk --json)"

                  python3 - "$AFFECTED_PROJECTS_JSON" "$WALLET_SDK_AFFECTED_JSON" >> "$GITHUB_OUTPUT" <<'PY'
                  import json
                  import sys

                  affected = set(json.loads(sys.argv[1]))
                  wallet_sdk_affected = bool(json.loads(sys.argv[2]))
                  docs_examples_project = "docs-wallet-integration-guide-examples"
                  docs_examples_affected = docs_examples_project in affected

                  run_tests = wallet_sdk_affected or docs_examples_affected
                  matched = []
                  if wallet_sdk_affected:
                      matched.append("@canton-network/wallet-sdk")
                  if docs_examples_affected:
                      matched.append(docs_examples_project)

                  print(f"run_wallet_sdk_tests={'true' if run_tests else 'false'}")
                  print(f"matched_projects={','.join(matched)}")
                  PY

            - name: Show affected wallet-sdk projects
              run: |
                  echo "run_wallet_sdk_tests=${{ steps.affected.outputs.run_wallet_sdk_tests }}"
                  echo "matched_projects=${{ steps.affected.outputs.matched_projects }}"

    sdk-e2e:
        name: sdk-e2e (${{ matrix.network }})
        runs-on: ubuntu-latest
        needs: [build, wallet-sdk-affected]
        if: needs.wallet-sdk-affected.outputs.run_wallet_sdk_tests == 'true'
        strategy:
            fail-fast: false
            matrix:
                network: [devnet, mainnet]

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - uses: ./.github/actions/setup_yarn

            - uses: ./.github/actions/setup_canton
              with:
                  network: ${{ matrix.network }}

            - uses: ./.github/actions/check_resources

            - name: Test example snippets (${{ matrix.network }})
              run: yarn nx snippets docs-wallet-integration-guide-examples

            - uses: ./.github/actions/check_resources

            - name: Test example scripts (${{ matrix.network }})
              run: yarn script:test:examples

            - uses: ./.github/actions/check_resources

            - name: Stop Localnet (${{ matrix.network }})
              if: always()
              run: yarn stop:localnet -- --network=${{ matrix.network }}

            - name: Save container logs
              if: failure()
              run: |
                  #!/usr/bin/env bash
                  set -euo pipefail
                  mkdir -p logs
                  for c in $(docker ps -a --format '{{.Names}}'); do
                    docker logs "$c" &> "logs/$c.log" || true
                  done

            - name: Upload logs as artifacts
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: docker-logs-${{ matrix.network }}
                  path: logs/

    test-wallet-sdk-e2e:
        name: test-wallet-sdk-e2e
        runs-on: ubuntu-latest
        needs: [wallet-sdk-affected, sdk-e2e]
        if: always()
        steps:
            - name: Report wallet-sdk e2e execution
              run: |
                  if [ "${{ needs.wallet-sdk-affected.outputs.run_wallet_sdk_tests }}" = "true" ]; then
                    if [ "${{ needs.sdk-e2e.result }}" != "success" ]; then
                      echo "wallet-sdk e2e was scheduled but did not succeed"
                      exit 1
                    fi
                    echo "all wallet-sdk-e2e envs passed"
                  else
                    echo "wallet-sdk e2e skipped (no affected wallet-sdk dependencies)"
                  fi

    test-wallet-sdk-pkg:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - uses: ./.github/actions/setup_yarn

            - name: Validate SDK package install
              run: yarn script:validate:package
