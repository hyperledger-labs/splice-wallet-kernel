                    exit 0
                  fi
                  echo "ci-internal test-wallet-sdk-e2e=${{ needs.ci-internal.outputs.test_wallet_sdk_e2e_result }}"
                  echo "ci-fork test-wallet-sdk-e2e=${{ needs.ci-fork.outputs.test_wallet_sdk_e2e_result }}"
                  exit 1

    test-ping-e2e:
        name: test-ping-e2e
        runs-on: ubuntu-latest
        needs: [ci-internal, ci-fork]
        if: always()
        steps:
            - name: Report test-ping-e2e status
              run: |
                  if [[ "${{ needs.ci-internal.outputs.test_ping_e2e_result }}" == "success" || "${{ needs.ci-fork.outputs.test_ping_e2e_result }}" == "success" ]]; then
                    exit 0
                  fi
                  if [[ "${{ needs.ci-internal.outputs.test_ping_e2e_result }}" == "skipped" && "${{ needs.ci-fork.outputs.test_ping_e2e_result }}" == "skipped" ]]; then
                    exit 0
                  fi
