name: Setup Yarn
description: 'Setup Yarn for the project'
runs:
    using: composite
    steps:
        - name: Enable Corepack
          shell: bash
          run: corepack enable

        - name: Setup Node.js
          uses: actions/setup-node@v6
          with:
              node-version: 'v24.9.0'
              cache: 'yarn'

        - name: Install dependencies
          shell: bash
          run: yarn install --immutable

        - name: generate daml codegen
          shell: bash
          run: yarn run script:generate:daml-codegen

          #we do a second run to get code-generated packages into the cache
        - name: Install dependencies
          shell: bash
          run: yarn install --immutable

        - uses: actions/cache@v5
          with:
              path: |
                  .nx/cache
                  .nx/workspace-data
              key: nx-${{ github.ref }}
              restore-keys: |
                  nx-
