name: 'Setup Canton/Localnet'
description: 'Cache, download and prepare Canton or Localnet environment'
inputs:
    network:
        description: 'Network type: canton, devnet, or mainnet'
        required: false
        default: 'devnet'
runs:
    using: 'composite'
    steps:
        - name: Read version config
          id: version-config
          shell: bash
          run: |
              CONFIG=$(cat scripts/src/lib/version-config.json)
              if [ "${{ inputs.network }}" == "canton" ]; then
                CANTON_VERSION=$(echo "$CONFIG" | jq -r '.DAML_RELEASE_VERSION')
                SPLICE_VERSION=""
              else
                CANTON_VERSION=$(echo "$CONFIG" | jq -r '.SUPPORTED_VERSIONS["${{ inputs.network }}"].canton.version')
                SPLICE_VERSION=$(echo "$CONFIG" | jq -r '.SUPPORTED_VERSIONS["${{ inputs.network }}"].splice.version')
              fi
              echo "canton_version=$CANTON_VERSION" >> $GITHUB_OUTPUT
              echo "splice_version=$SPLICE_VERSION" >> $GITHUB_OUTPUT

        - name: Cache Canton binaries
          if: inputs.network == 'canton'
          uses: actions/cache@v4
          id: canton-cache
          with:
              path: .canton
              key: ${{ runner.os }}-canton-${{ steps.version-config.outputs.canton_version }}
              restore-keys: |
                  ${{ runner.os }}-canton-

        - name: Create Docker cache directory
          if: inputs.network != 'canton'
          shell: bash
          run: mkdir -p /tmp/docker-images

        - name: Cache Docker images
          if: inputs.network != 'canton'
          uses: actions/cache@v4
          id: docker-cache
          with:
              path: |
                  /tmp/docker-images
                  .localnet
              key: ${{ runner.os }}-docker-${{ steps.version-config.outputs.splice_version }}
              restore-keys: |
                  ${{ runner.os }}-docker-

        - name: Load cached Docker images
          if: inputs.network != 'canton' && steps.docker-cache.outputs.cache-hit == 'true'
          shell: bash
          run: |
              if [ -f /tmp/docker-images/images.tar ]; then
                docker load -i /tmp/docker-images/images.tar
              fi

        - name: Download Canton
          if: inputs.network == 'canton' && steps.canton-cache.outputs.cache-hit != 'true'
          shell: bash
          run: yarn script:fetch:canton

        - name: Download Localnet
          if: inputs.network != 'canton' && steps.docker-cache.outputs.cache-hit != 'true'
          shell: bash
          run: yarn script:fetch:localnet -- --network=${{ inputs.network }}

        - name: Start Canton
          if: inputs.network == 'canton'
          shell: bash
          run: |
              set -e
              timeout 5m bash -c '
                LOGFILE=canton_start.log
                yarn start:canton > "$LOGFILE" 2>&1 &
                pid=$!
                for i in {1..60}; do
                  if grep -q "Bootstrap script successfully executed." "$LOGFILE"; then
                    echo "Canton started successfully."
                    exit 0
                  fi
                  if ! kill -0 $pid 2>/dev/null; then
                    echo "Canton process exited unexpectedly."
                    cat "$LOGFILE"
                    exit 1
                  fi
                  sleep 5
                done
                echo "Timeout: '"'"'Bootstrap script successfully executed.'"'"' not found in 5 minutes."
                cat "$LOGFILE"
                exit 1
              '

        - name: Start Localnet
          if: inputs.network != 'canton'
          shell: bash
          run: yarn start:localnet -- --network=${{ inputs.network }}

        - name: Save Docker images to cache
          if: inputs.network != 'canton' && steps.docker-cache.outputs.cache-hit != 'true'
          shell: bash
          run: |
              docker images --format "{{.Repository}}:{{.Tag}}" | grep -v "<none>" | xargs -r docker save -o /tmp/docker-images/images.tar
