name: 'Setup Canton/Localnet'
description: 'Cache, download and prepare Canton or Localnet environment'
inputs:
    network:
        description: 'Network type: canton, devnet, or mainnet'
        required: false
        default: 'devnet'
runs:
    using: 'composite'
    steps:
        - name: Read version config
          id: version-config
          shell: bash
          run: |
              CONFIG=$(cat scripts/src/lib/version-config.json)
              NETWORK="${{ inputs.network }}"
              if [ "$NETWORK" == "canton" ]; then
                CANTON_VERSION=$(echo "$CONFIG" | jq -r '.DAML_RELEASE_VERSION')
                SPLICE_VERSION=""
              else
                CANTON_VERSION=$(echo "$CONFIG" | jq -r --arg net "$NETWORK" '.SUPPORTED_VERSIONS[$net].canton.version')
                SPLICE_VERSION=$(echo "$CONFIG" | jq -r --arg net "$NETWORK" '.SUPPORTED_VERSIONS[$net].splice.version')
              fi
              echo "canton_version=$CANTON_VERSION" >> $GITHUB_OUTPUT
              echo "splice_version=$SPLICE_VERSION" >> $GITHUB_OUTPUT

        - name: Cache Canton binaries
          if: inputs.network == 'canton'
          uses: actions/cache/restore@v4
          id: canton-cache
          with:
              path: .canton
              key: ${{ runner.os }}-canton-${{ steps.version-config.outputs.canton_version }}
              restore-keys: |
                  ${{ runner.os }}-canton-

        - name: Cache Localnet files
          if: inputs.network != 'canton'
          uses: actions/cache/restore@v4
          id: localnet-cache
          with:
              path: .localnet/docker-compose/localnet
              key: ${{ runner.os }}-localnet-${{ steps.version-config.outputs.splice_version }}
              restore-keys: |
                  ${{ runner.os }}-localnet-

        - name: Download Canton
          if: inputs.network == 'canton' && steps.canton-cache.outputs.cache-hit != 'true'
          shell: bash
          run: yarn script:fetch:canton

        - name: Download Localnet
          if: inputs.network != 'canton' && steps.localnet-cache.outputs.cache-hit != 'true'
          shell: bash
          run: yarn script:fetch:localnet -- --network=${{ inputs.network }}

        - name: Start Canton
          if: inputs.network == 'canton'
          shell: bash
          run: |
              set -e
              timeout 5m bash -c '
                LOGFILE=canton_start.log
                yarn start:canton > "$LOGFILE" 2>&1 &
                pid=$!
                for i in {1..60}; do
                  if grep -q "Bootstrap script successfully executed." "$LOGFILE"; then
                    echo "Canton started successfully."
                    exit 0
                  fi
                  if ! kill -0 $pid 2>/dev/null; then
                    echo "Canton process exited unexpectedly."
                    cat "$LOGFILE"
                    exit 1
                  fi
                  sleep 5
                done
                echo "Timeout: '"'"'Bootstrap script successfully executed.'"'"' not found in 5 minutes."
                cat "$LOGFILE"
                exit 1
              '

        - name: Start Localnet
          if: inputs.network != 'canton'
          shell: bash
          run: yarn start:localnet -- --network=${{ inputs.network }}

        - name: Save Canton cache
          if: ${{ always() && inputs.network == 'canton' && steps.canton-cache.outputs.cache-hit != 'true' }}
          uses: actions/cache/save@v4
          with:
              path: .canton
              key: ${{ runner.os }}-canton-${{ steps.version-config.outputs.canton_version }}

        - name: Save Localnet cache
          if: ${{ always() && inputs.network != 'canton' && steps.localnet-cache.outputs.cache-hit != 'true' }}
          uses: actions/cache/save@v4
          with:
              path: .localnet/docker-compose/localnet
              key: ${{ runner.os }}-localnet-${{ steps.version-config.outputs.splice_version }}
